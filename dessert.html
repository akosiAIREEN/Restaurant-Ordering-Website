<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dessert - McDonald's</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div class="header">
        <img src="images.jpeg/logo.jpeg" alt="McDonald's Logo">
        <h1>McDonald's</h1>
    </div>

    <nav>
        <a href="index.html">Main Course</a> | 
        <a href="drinks.html">Drinks</a> | 
        <a href="dessert.html">Dessert</a>
    </nav>

    <h2>Dessert Menu</h2>
    
    <div class="menu-item">
        <img src="images.jpeg/Mcflurry.jpeg" alt="McFlurry">
        <span><strong>Oreo McFlurry</strong> 200.00 php</span>
        <input type="number" min="0" value="0" class="item-qty" data-price="200.00" aria-label="Item Quantity">
    </div>
    <div class="menu-item">
        <img src="images.jpeg/peach&oreo.jpeg" alt="Peach pie">
        <span><strong>Hot Peach Pie</strong> 50.00 php </span>
        <input type="number" min="0" value="0" class="item-qty" data-price="50.00" aria-label="Item Quantity">
    </div>
    <div class="menu-item">
        <img src="images.jpeg/sunday.jpeg" alt="Sundae">
        <span><strong>Vanilla Sundae with Hot Fudge</strong> 95.00 php</span>
        <input type="number" min="0" value="0" class="item-qty" data-price="95.00" aria-label="Item Quantity">
    </div>

    <div class="checkout">
        <button onclick="computeTotal()">Compute Total</button>
        <div class="total-display">Total Price: $<span id="total-price">0.00</span></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
